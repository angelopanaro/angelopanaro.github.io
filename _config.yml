# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
title                    : "Angelo Vito Panaro"
title_separator          : "-"
name                     : &name "Your Name"
description              : &description ""   # Update this with a general description of your site, this is the default if not overridden by a page
url                      : "https://angelopanaro.github.io" # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "angelopanaro/angelopanaro.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "profile.png"
  name             : "Angelo Vito Panaro"
  pronouns         :  # example: "she/her"  
  bio              : "Postdoctoral Researcher, 
  Friedrich-Alexander-University (FAU), Institute of Political Science"
  location         : "Erlangen"
  employer         : 
  uri              :  "https://www.pol.phil.fau.eu/person/angelo-vito-panaro/" # URL
  email            : "angelo.panaro@fau.de" 
  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=u8_cqnQAAAAJ&hl=it"
  orcid            : "https://orcid.org/0000-0002-6585-6083"
  researchgate     : "https://www.researchgate.net/profile/Angelo_Vito_Panaro" # URL
  # Social media
  bluesky          : "angelovpanaro.bsky.social" # Replace this with you Bluesky username
  linkedin         : "angelo-vito-panaro-88b66741" # Username

# -----------------------------
# Basic Site Settings
# -----------------------------
locale                   : "en-US"
title                    : "Lolli"
title_separator          : "-"
name                     : &name "Your Name"
description              : &description ""
url                      : "https://Lolli.github.io"
baseurl                  : ""
repository               : "Lolli/Lolli.github.io"

# -----------------------------
# Theme & Navbar Customization
# -----------------------------
theme: "air"          # Base theme
color_mode:
  default: light      # Force light mode
  toggle: false       # Hide the dark/light mode toggle button

# Apply custom CSS to style navbar colors
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      custom_css: "/assets/css/custom.css"

# -----------------------------
# Publication Categories
# -----------------------------
publication_category:
  journal_articles:
    title: 'Articles in peer-reviewed journals'
  other_articles:
    title: 'Other Articles'
  books:
    title: 'Book Chapters'
  reviews:
    title: 'Book Reviews'
  working_papers:
    title: 'Working Papers'
  policy_reports:
    title: 'Policy Reports'
  open_pieces:
    title: 'Open Pieces'

# -----------------------------
# Site Settings
# -----------------------------
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"
atom_feed:
  hide                   : false
  path                    :

# -----------------------------
# Analytics
# -----------------------------
analytics:
  provider               : "false"
  google:
    tracking_id          :

# -----------------------------
# File Inclusion & Exclusion
# -----------------------------
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -----------------------------
# Markdown & Output
# -----------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -----------------------------
# Collections
# -----------------------------
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# -----------------------------
# Defaults for Pages & Collections
# -----------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# -----------------------------
# Sass/SCSS
# -----------------------------
sass:
  sass_dir: _sass
  style: compressed

# -----------------------------
# Permalinks & Timezone
# -----------------------------
permalink: /:categories/:title/
timezone: Etc/UTC

# -----------------------------
# Plugins
# -----------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# -----------------------------
# Archives
# -----------------------------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# -----------------------------
# HTML Compression
# -----------------------------
compress_html:
  clippings: all
  ignore:
    envs: development

